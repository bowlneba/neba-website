name: Mutation Testing

on:
  workflow_call:
    inputs:
      is_pull_request:
        description: "Whether this is running for a pull request"
        type: boolean
        required: true
      dashboard_version:
        description: "Version label for the Stryker dashboard (branch name or 'main')"
        type: string
        required: true
      pr_number:
        description: "Pull request number for posting the summary comment (empty if not a PR)"
        type: string
        required: false
        default: ""
    secrets:
      STRYKER_DASHBOARD_KEY:
        required: true

jobs:
  mutation-js:
    name: JavaScript (break ≥ 0%)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch main for diff baseline
        if: ${{ inputs.is_pull_request }}
        run: git fetch origin main:refs/remotes/origin/main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Restore Stryker incremental cache
        uses: actions/cache/restore@v4
        with:
          path: reports/mutation/incremental.json
          key: stryker-js-incremental-${{ github.sha }}
          restore-keys: |
            stryker-js-incremental-

      - name: Run Stryker (full run)
        if: ${{ !inputs.is_pull_request }}
        run: npm run test:mutation
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_KEY }}
          STRYKER_DASHBOARD_VERSION: ${{ inputs.dashboard_version }}

      - name: Save Stryker incremental cache
        if: ${{ !inputs.is_pull_request }}
        uses: actions/cache/save@v4
        with:
          path: reports/mutation/incremental.json
          key: stryker-js-incremental-${{ github.sha }}

      - name: Run Stryker (diff — PR files only)
        if: ${{ inputs.is_pull_request }}
        run: npm run test:mutation:diff
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_KEY }}
          STRYKER_DASHBOARD_VERSION: ${{ inputs.dashboard_version }}

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: mutation-report-js
          path: reports/mutation/
          retention-days: 14

  mutation-domain:
    name: Domain (break ≥ 85%)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch main for diff baseline
        if: ${{ inputs.is_pull_request }}
        run: git fetch origin main:refs/remotes/origin/main

      - name: Setup .NET
        uses: actions/setup-dotnet@v4

      - name: Install dotnet-stryker
        run: dotnet tool install --global dotnet-stryker

      - name: Build
        run: dotnet build tests/Neba.Domain.Tests --configuration Release

      - name: Run Stryker (full run)
        if: ${{ !inputs.is_pull_request }}
        working-directory: tests/Neba.Domain.Tests
        run: dotnet stryker --reporter dashboard
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_KEY }}
          STRYKER_DASHBOARD_VERSION: ${{ inputs.dashboard_version }}

      - name: Run Stryker (diff — PR files only)
        if: ${{ inputs.is_pull_request }}
        working-directory: tests/Neba.Domain.Tests
        run: dotnet stryker --reporter dashboard --since:origin/main
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_KEY }}
          STRYKER_DASHBOARD_VERSION: ${{ inputs.dashboard_version }}

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: mutation-report-domain
          path: tests/Neba.Domain.Tests/StrykerOutput/
          retention-days: 14

  mutation-application:
    name: Application (break ≥ 85%)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch main for diff baseline
        if: ${{ inputs.is_pull_request }}
        run: git fetch origin main:refs/remotes/origin/main

      - name: Setup .NET
        uses: actions/setup-dotnet@v4

      - name: Install dotnet-stryker
        run: dotnet tool install --global dotnet-stryker

      - name: Build
        run: dotnet build tests/Neba.Application.Tests --configuration Release

      - name: Run Stryker (full run)
        if: ${{ !inputs.is_pull_request }}
        working-directory: tests/Neba.Application.Tests
        run: dotnet stryker --reporter dashboard
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_KEY }}
          STRYKER_DASHBOARD_VERSION: ${{ inputs.dashboard_version }}

      - name: Run Stryker (diff — PR files only)
        if: ${{ inputs.is_pull_request }}
        working-directory: tests/Neba.Application.Tests
        run: dotnet stryker --reporter dashboard --since:origin/main
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_KEY }}
          STRYKER_DASHBOARD_VERSION: ${{ inputs.dashboard_version }}

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: mutation-report-application
          path: tests/Neba.Application.Tests/StrykerOutput/
          retention-days: 14

  mutation-api:
    name: API (break ≥ 75%)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch main for diff baseline
        if: ${{ inputs.is_pull_request }}
        run: git fetch origin main:refs/remotes/origin/main

      - name: Setup .NET
        uses: actions/setup-dotnet@v4

      - name: Install dotnet-stryker
        run: dotnet tool install --global dotnet-stryker

      - name: Build
        run: dotnet build tests/Neba.Api.Tests --configuration Release

      - name: Run Stryker (full run)
        if: ${{ !inputs.is_pull_request }}
        working-directory: tests/Neba.Api.Tests
        run: dotnet stryker --reporter dashboard
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_KEY }}
          STRYKER_DASHBOARD_VERSION: ${{ inputs.dashboard_version }}

      - name: Run Stryker (diff — PR files only)
        if: ${{ inputs.is_pull_request }}
        working-directory: tests/Neba.Api.Tests
        run: dotnet stryker --reporter dashboard --since:origin/main
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_KEY }}
          STRYKER_DASHBOARD_VERSION: ${{ inputs.dashboard_version }}

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: mutation-report-api
          path: tests/Neba.Api.Tests/StrykerOutput/
          retention-days: 14

  mutation-blazor:
    name: Blazor (break ≥ 65%)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch main for diff baseline
        if: ${{ inputs.is_pull_request }}
        run: git fetch origin main:refs/remotes/origin/main

      - name: Setup .NET
        uses: actions/setup-dotnet@v4

      - name: Install dotnet-stryker
        run: dotnet tool install --global dotnet-stryker

      - name: Build
        run: dotnet build tests/Neba.Website.Tests --configuration Release

      - name: Run Stryker (full run)
        if: ${{ !inputs.is_pull_request }}
        working-directory: tests/Neba.Website.Tests
        run: dotnet stryker --reporter dashboard
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_KEY }}
          STRYKER_DASHBOARD_VERSION: ${{ inputs.dashboard_version }}

      - name: Run Stryker (diff — PR files only)
        if: ${{ inputs.is_pull_request }}
        working-directory: tests/Neba.Website.Tests
        run: dotnet stryker --reporter dashboard --since:origin/main
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_KEY }}
          STRYKER_DASHBOARD_VERSION: ${{ inputs.dashboard_version }}

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: mutation-report-blazor
          path: tests/Neba.Website.Tests/StrykerOutput/
          retention-days: 14

  mutation-summary:
    name: PR Comment — Mutation Results
    needs: [mutation-js, mutation-domain, mutation-application, mutation-api, mutation-blazor]
    if: ${{ always() && inputs.is_pull_request && inputs.pr_number != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write

    steps:
      - name: Post mutation summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ inputs.dashboard_version }}';
            const project = 'github.com/bowlneba/neba-website';

            const layers = [
              {
                name: 'Domain',
                module: 'domain',
                breakThreshold: '≥ 85%',
                result: '${{ needs.mutation-domain.result }}',
              },
              {
                name: 'Application',
                module: 'application',
                breakThreshold: '≥ 85%',
                result: '${{ needs.mutation-application.result }}',
              },
              {
                name: 'API',
                module: 'api',
                breakThreshold: '≥ 75%',
                result: '${{ needs.mutation-api.result }}',
              },
              {
                name: 'Blazor',
                module: 'blazor',
                breakThreshold: '≥ 65%',
                result: '${{ needs.mutation-blazor.result }}',
              },
              {
                name: 'JavaScript',
                module: 'website-js',
                breakThreshold: '≥ 0% (rollout)',
                result: '${{ needs.mutation-js.result }}',
              },
            ];

            const rows = layers.map(({ name, module, breakThreshold, result }) => {
              const emoji = result === 'success' ? '✅' : result === 'failure' ? '❌' : '⚠️';
              const url = `https://dashboard.stryker-mutator.io/reports/${project}/${module}/${version}`;
              return `| ${name} | ${breakThreshold} | ${emoji} ${result} | [${module}](${url}) |`;
            });

            const body = [
              '## Mutation Testing Results',
              '',
              '| Layer | Break Threshold | Status | Dashboard |',
              '|-------|----------------|--------|-----------|',
              ...rows,
              '',
              '_Diff run — only mutants in files changed by this PR were executed._',
              '',
              '> Generated by [Stryker Mutator](https://stryker-mutator.io)',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ inputs.pr_number }}'),
              body,
            });
