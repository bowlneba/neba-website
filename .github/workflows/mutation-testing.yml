name: Mutation Testing

on:
  workflow_call:
    inputs:
      is_pull_request:
        description: "Whether this is running for a pull request"
        type: boolean
        required: true
      dashboard_version:
        description: "Version label for the Stryker dashboard (branch name or 'main')"
        type: string
        required: true
      pr_number:
        description: "Pull request number for posting the summary comment (empty if not a PR)"
        type: string
        required: false
        default: ""
    secrets:
      STRYKER_DASHBOARD_KEY:
        required: true

jobs:
  mutation-js:
    name: JavaScript (break ≥ 0%)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch main for diff baseline
        if: ${{ inputs.is_pull_request }}
        run: git fetch origin main:refs/remotes/origin/main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Stryker (full run)
        if: ${{ !inputs.is_pull_request }}
        run: npm run test:mutation
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_KEY }}
          STRYKER_DASHBOARD_VERSION: ${{ inputs.dashboard_version }}

      - name: Run Stryker (diff — PR files only)
        if: ${{ inputs.is_pull_request }}
        run: npm run test:mutation:diff
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_KEY }}
          STRYKER_DASHBOARD_VERSION: ${{ inputs.dashboard_version }}

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: mutation-report-js
          path: reports/mutation/
          retention-days: 14

  mutation-summary:
    name: PR Comment — Mutation Results
    needs: mutation-js
    if: ${{ always() && inputs.is_pull_request && inputs.pr_number != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write

    steps:
      - name: Post mutation summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ inputs.dashboard_version }}';
            const project = 'github.com/bowlneba/neba-website';
            const module = 'website-js';
            const dashboardUrl = `https://dashboard.stryker-mutator.io/reports/${project}/${module}/${version}`;
            const result = '${{ needs.mutation-js.result }}';
            const statusEmoji = result === 'success' ? '✅' : result === 'failure' ? '❌' : '⚠️';

            const body = [
              '## Mutation Testing Results',
              '',
              '| Layer | Break Threshold | Status | Dashboard |',
              '|-------|----------------|--------|-----------|',
              `| JavaScript | ≥ 0% (rollout) | ${statusEmoji} ${result} | [website-js](${dashboardUrl}) |`,
              '',
              '_Diff run — only mutants in files changed by this PR were executed._',
              '',
              '> Generated by [Stryker Mutator](https://stryker-mutator.io)',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ inputs.pr_number }}'),
              body,
            });
